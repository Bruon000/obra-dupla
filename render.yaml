# Blueprint opcional: Render → New Blueprint → conectar repo.
# Secrets no painel: DATABASE_URL, JWT_SECRET, (opcional) DATABASE_URL_DIRECT, R2_*, SUPABASE_*.
# Guia passo a passo: docs/ONLINE-NETLIFY-RENDER.md
services:
  - type: web
    name: obra-dupla
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      # Plano grátis: evita OOM em picos de JSON (lista com muitos dados)
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
