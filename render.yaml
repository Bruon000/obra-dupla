# Blueprint opcional: Render → New Blueprint → conectar repo.
# Secrets no painel: DATABASE_URL, JWT_SECRET, (opcional) DATABASE_URL_DIRECT, R2_*, SUPABASE_*.
# Guia passo a passo: docs/ONLINE-NETLIFY-RENDER.md
services:
  - type: web
    name: obra-dupla
    runtime: node
    rootDir: apps/api
    # apps/api inclui package-lock.json — npm ci é mais rápido e reproduzível que npm install
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      # Plano grátis: evita OOM em picos de JSON (lista com muitos dados)
      # Plano grátis ~512MB RAM total — 384MB heap deixa margem ao SO/Prisma
      - key: NODE_OPTIONS
        value: --max-old-space-size=320
